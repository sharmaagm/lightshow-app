<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lightshow DJ Controller</title>
  <style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: #ffffff; --accent: #00ffcc; }
    body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; }
    
    h1 { margin: 0 0 5px 0; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
    .stats { font-size: 22px; color: var(--accent); margin-bottom: 25px; font-weight: bold; }
    
    .control-panel { background: var(--panel); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 20px; }
    
    .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    button { padding: 20px; font-size: 16px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; transition: transform 0.1s; color: #fff; text-transform: uppercase; }
    button:active { transform: scale(0.95); }
    
    .btn-on { background: linear-gradient(135deg, #28a745, #20c997); }
    .btn-sparkle { background: linear-gradient(135deg, #f1c40f, #e67e22); color: #000; font-size: 18px; }
    .btn-strobe { background: linear-gradient(135deg, #dc3545, #fd7e14); grid-column: span 2; font-size: 20px; }
    .btn-off { background: #333; border: 2px solid #555; grid-column: span 2; color: #aaa; }
    
    .slider-group { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 14px; color: #bbb; font-weight: bold; }
    
    input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--accent); }
    input[type="color"] { width: 100%; height: 50px; border: none; border-radius: 8px; cursor: pointer; background: none; }
  </style>
</head>
<body>

  <h1>Control Deck</h1>
  <div class="stats">Live Phones: <span id="user-count">0</span></div>

  <div class="control-panel">
    
    <div class="button-grid">
      <button class="btn-on" onclick="sendSolidColor()">Solid Custom</button>
      <button class="btn-sparkle" onclick="sendSparkle()">✨ Sparkle</button>
      <button class="btn-strobe" onclick="sendStrobe()">Start Strobe</button>
      <button class="btn-off" onclick="sendCommand('off')">All Lights Off</button>
    </div>

    <div class="slider-group">
      <label><span>Custom Color</span></label>
      <input type="color" id="color-picker" value="#ffffff" onchange="updateLiveSettings()">
    </div>

    <div class="slider-group">
      <label><span>Speed (Strobe/Sparkle)</span> <span id="speed-display">150ms</span></label>
      <input type="range" id="speed-slider" min="50" max="1000" step="10" value="150" oninput="updateSpeedDisplay()" onchange="updateLiveSettings()">
    </div>
    
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let currentMode = 'off';

    socket.on('user_count', (count) => {
      const actualUsers = Math.max(0, count - 1);
      document.getElementById('user-count').innerText = actualUsers;
    });

    function sendCommand(action, color = 'black', speed = 0) {
      currentMode = action;
      socket.emit('send_light_command', { action, color, speed });
    }

    function sendSolidColor() {
      const color = document.getElementById('color-picker').value;
      sendCommand('on', color);
    }

    function sendStrobe() {
      const speed = document.getElementById('speed-slider').value;
      const color = document.getElementById('color-picker').value;
      sendCommand('strobe', color, speed);
    }

    function sendSparkle() {
      const speed = document.getElementById('speed-slider').value;
      const color = document.getElementById('color-picker').value;
      sendCommand('sparkle', color, speed);
    }

    function updateSpeedDisplay() {
      const speed = document.getElementById('speed-slider').value;
      document.getElementById('speed-display').innerText = speed + 'ms';
    }

    function updateLiveSettings() {
      if (currentMode === 'strobe') sendStrobe();
      else if (currentMode === 'on') sendSolidColor();
      else if (currentMode === 'sparkle') sendSparkle();
    }
  </script>
</body>
</html>
