<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lightshow</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: black; color: white; overflow: hidden; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #start-btn { padding: 20px 40px; font-size: 20px; background: white; color: black; border: none; border-radius: 10px; cursor: pointer; z-index: 10; font-weight: bold; }
    #status { margin-top: 20px; text-align: center; z-index: 10; padding: 0 20px; font-size: 14px; opacity: 0.8; }
    #screen-light { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1; transition: background 0.05s; }
  </style>
</head>
<body>

  <div id="screen-light"></div>
  
  <button id="start-btn">Join the Lightshow</button>
  <div id="status">Waiting to join...</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const startBtn = document.getElementById('start-btn');
    const statusText = document.getElementById('status');
    const screenLight = document.getElementById('screen-light');
    
    let videoTrack = null;
    let strobeInterval;
    let hasHardwareLight = false;

    // Attempt to connect to the physical hardware
    async function setupFlashlight() {
      try {
        // 1. Ask for basic permission first to unlock device labels
        await navigator.mediaDevices.getUserMedia({ video: true });

        // 2. Get a list of EVERY media device on the phone
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(device => device.kind === 'videoinput');

        statusText.innerText = `Scanning ${videoDevices.length} cameras for a flashlight...`;

        // 3. Test each camera one by one
        for (let i = 0; i < videoDevices.length; i++) {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { deviceId: { exact: videoDevices[i].deviceId } }
          });
          
          const track = stream.getVideoTracks()[0];
          
          // Wait a tiny fraction of a second for the hardware to wake up
          await new Promise(resolve => setTimeout(resolve, 100));
          
          const capabilities = track.getCapabilities();

          if (capabilities.torch) {
            // We found the golden lens!
            videoTrack = track;
            hasHardwareLight = true;
            statusText.innerText = "Connected! Hardware Flashlight Ready.";
            return; // Stop searching, we are good to go!
          } else {
            // Not this lens, turn it off so we don't drain the battery
            track.stop(); 
          }
        }

        // If the loop finishes and we didn't return, no hardware flash exists
        statusText.innerText = "Connected! (Screen-only mode).";

      } catch (err) {
        console.error("Camera error:", err);
        statusText.innerText = "Camera denied or unavailable. Using screen-only mode.";
      }
    }

    // Trigger both the hardware and the screen fallback
    async function setLights(isOn, color) {
      // 1. Try Hardware light
      if (hasHardwareLight && videoTrack) {
        try {
          await videoTrack.applyConstraints({ advanced: [{ torch: isOn }] });
        } catch (err) {
          console.error("Torch error:", err);
        }
      }
      
      // 2. Always trigger the screen light as a visual backup
      if (isOn) {
        screenLight.style.background = color || 'white';
      } else {
        screenLight.style.background = 'black';
      }
    }

    // Start everything when they click the button
    startBtn.addEventListener('click', async () => {
      startBtn.style.display = 'none';
      statusText.innerText = "Requesting camera access...";
      
      try { await navigator.wakeLock.request('screen'); } 
      catch (err) { console.log('Wake Lock denied'); }

      await setupFlashlight();

      // Listen to the Admin controller
      socket.on('light_command', async (data) => {
        clearInterval(strobeInterval);

        if (data.action === 'on') {
          await setLights(true, data.color);
        } else if (data.action === 'off') {
          await setLights(false, 'black');
        } else if (data.action === 'strobe') {
          let isOn = false;
          strobeInterval = setInterval(async () => {
            isOn = !isOn;
            await setLights(isOn, data.color);
          }, data.speed || 150);
        }
      });
    });
  </script>
</body>
</html>
