<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Live Lightshow</title>
  <style>
    :root { --accent: #00ffcc; }
    body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: black; color: white; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; }
    
    /* The main screen fallback flash layer */
    #screen-light { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1; transition: background 0.05s; }
    
    /* The frosted glass UI container */
    .ui-container { z-index: 10; background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px 30px; text-align: center; width: 85%; max-width: 350px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); transition: opacity 0.4s ease; }
    
    .hidden { display: none !important; }
    
    .icon { font-size: 50px; margin-bottom: 15px; }
    h2 { margin: 0 0 10px 0; font-size: 28px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
    p { margin: 0 0 30px 0; font-size: 15px; color: #aaaaaa; line-height: 1.4; }
    
    /* The glowing join button */
    .join-btn { background: linear-gradient(135deg, #00ffcc, #0088ff); color: black; font-size: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; border: none; border-radius: 50px; padding: 20px 40px; cursor: pointer; box-shadow: 0 10px 30px rgba(0, 255, 204, 0.3); transition: transform 0.2s, box-shadow 0.2s; width: 100%; }
    .join-btn:active { transform: scale(0.95); box-shadow: 0 5px 15px rgba(0, 255, 204, 0.2); }
    
    /* Simple spinning animation for the loading state */
    .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: var(--accent); animation: spin 1s ease-in-out infinite; margin-bottom: 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .pulse { animation: pulseAnim 2s infinite; }
    @keyframes pulseAnim { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body>

  <div id="screen-light"></div>
  
  <div class="ui-container" id="ui-box">
    
    <!-- State 1: Welcome / Join -->
    <div id="state-join">
      <div class="icon">✨</div>
      <h2>Lightshow</h2>
      <p>Get ready to light up the dance floor. Keep your browser open.</p>
      <button class="join-btn" id="start-btn">Join Now</button>
    </div>

    <!-- State 2: Connecting (No technical text) -->
    <div id="state-loading" class="hidden">
      <div class="spinner"></div>
      <h2>Connecting</h2>
      <p>Syncing with the DJ...</p>
    </div>

    <!-- State 3: Ready! -->
    <div id="state-ready" class="hidden">
      <div class="icon pulse">✅</div>
      <h2>You're Synced!</h2>
      <p>Hold your phone up and wait for the lights to drop. Do not lock your screen.</p>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    
    // UI Elements
    const uiBox = document.getElementById('ui-box');
    const stateJoin = document.getElementById('state-join');
    const stateLoading = document.getElementById('state-loading');
    const stateReady = document.getElementById('state-ready');
    const screenLight = document.getElementById('screen-light');
    
    let videoTrack = null;
    let strobeInterval;
    let hasHardwareLight = false;
    let currentClientMode = 'off';

    // The silent, background camera connector
    async function setupFlashlight() {
      try {
        const initialStream = await navigator.mediaDevices.getUserMedia({ video: true });
        initialStream.getTracks().forEach(track => track.stop());

        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(device => device.kind === 'videoinput');

        for (let i = 0; i < videoDevices.length; i++) {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { deviceId: { exact: videoDevices[i].deviceId } }
            });
            const track = stream.getVideoTracks()[0];
            await new Promise(resolve => setTimeout(resolve, 100));
            
            if (track.getCapabilities().torch) {
              videoTrack = track;
              hasHardwareLight = true;
              return; // Golden lens found!
            } else {
              track.stop(); 
            }
          } catch (lensError) {
            // Ignore bad lenses silently
          }
        }
      } catch (err) {
        // Silently fail to screen-only mode
        console.log("Using screen-only fallback mode.");
      }
    }

    async function setLights(isOn, color) {
      if (hasHardwareLight && videoTrack) {
        try { await videoTrack.applyConstraints({ advanced: [{ torch: isOn }] }); } 
        catch (err) { /* silent fail */ }
      }
      screenLight.style.background = isOn ? (color || 'white') : 'black';
    }

    // When they click the beautiful join button
    document.getElementById('start-btn').addEventListener('click', async () => {
      // Switch UI to loading state
      stateJoin.classList.add('hidden');
      stateLoading.classList.remove('hidden');
      
      try { await navigator.wakeLock.request('screen'); } 
      catch (err) { console.log('Wake Lock denied'); }

      // Do the hardware setup silently in the background
      await setupFlashlight();

      // Switch UI to Ready state!
      stateLoading.classList.add('hidden');
      stateReady.classList.remove('hidden');

      // Listen to the DJ
      socket.on('light_command', async (data) => {
        clearInterval(strobeInterval);
        currentClientMode = data.action;

        // FADE OUT THE UI BOX IF LIGHTS ARE ACTIVE!
        if (currentClientMode === 'off') {
          uiBox.style.opacity = '1';
          await setLights(false, 'black');
        } else {
          uiBox.style.opacity = '0'; // Hides the box so screen colors pop
          
          if (data.action === 'on') {
            await setLights(true, data.color);
          
          } else if (data.action === 'strobe') {
            let isOn = false;
            strobeInterval = setInterval(async () => {
              isOn = !isOn;
              await setLights(isOn, data.color);
            }, data.speed || 150);
          
          } else if (data.action === 'sparkle') {
            let isOn = false;
            const randomStartDelay = Math.random() * 1000;
            const baseSpeed = parseInt(data.speed) || 150;
            const randomSpeed = baseSpeed + (Math.random() * 100) - 50; 

            setTimeout(() => {
              if (currentClientMode !== 'sparkle') return; 
              strobeInterval = setInterval(async () => {
                isOn = !isOn;
                if (Math.random() > 0.2) await setLights(isOn, data.color);
                else await setLights(false, 'black');
              }, Math.max(80, randomSpeed));
            }, randomStartDelay);
          }
        }
      });
    });
  </script>
</body>
</html>
